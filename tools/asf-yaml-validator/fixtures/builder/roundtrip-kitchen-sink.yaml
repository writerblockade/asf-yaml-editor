# ROUNDTRIP: a broad, valid file touching many blocks + types (ints, bools,
# nulls, lists, nested maps) to stress the dump/parse round-trip.
project:
  metadata:
    key: tooling-trusted-releases
    committee: tooling
    name: Apache Trusted Releases
    repositories:
      - git+ssh://git@github.com:apache/tooling-trusted-releases.git
    categories:
      - build-management
  policy:
    vote_mode: email
    min_hours: 72
    license_check_mode: RAT
    vote_recipients:
      to: private@tooling.apache.org
      cc:
        - dev@tooling.apache.org
  features:
    atr_sync: true
notifications:
  commits: commits@tooling.apache.org
  issues: issues@tooling.apache.org
  jira_options: link label
staging:
  profile: ~
  whoami: asf-staging
publish:
  whoami: asf-site
github:
  description: A platform for making official ASF software releases.
  labels:
    - releases
    - apache
  collaborators:
    - Humbedooh
    - gstein
  dependabot_alerts: true
  features:
    issues: true
    discussions: false
  enabled_merge_buttons:
    squash: true
    squash_commit_message: PR_TITLE
    merge: false
    rebase: false
  pull_requests:
    allow_auto_merge: true
    del_branch_on_merge: true
  protected_branches:
    main:
      required_signatures: true
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        required_approving_review_count: 2
      required_status_checks:
        strict: true
        checks:
          - context: gh-infra/jenkins
            app_id: 1234
