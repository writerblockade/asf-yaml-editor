# ROUNDTRIP: must survive import->emit->import deep-equal with zero key loss.
# A raw GitHub Rulesets API payload entry (the carve-out the form keeps as raw).
github:
  rulesets:
    - name: "Custom branch policy"
      target: branch
      enforcement: active
      conditions:
        ref_name:
          include:
            - "~DEFAULT_BRANCH"
          exclude: []
      rules:
        - type: deletion
        - type: non_fast_forward
        - type: required_signatures
        - type: pull_request
          parameters:
            dismiss_stale_reviews_on_push: true
            require_code_owner_review: true
            require_last_push_approval: false
            required_approving_review_count: 2
            required_review_thread_resolution: true
      bypass_actors:
        - actor_id: 5
          actor_type: Team
          bypass_mode: always
